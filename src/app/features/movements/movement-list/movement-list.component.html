<div class="page-header">
  <div>
    <h1 class="page-title">Stock Movements</h1>
    <p class="page-subtitle">Full audit trail of all inventory movements</p>
  </div>
  <span class="text-sm text-muted">{{ totalElements() | number }} records total</span>
</div>

<!-- Filters -->
<div class="card toolbar-card">
  <div class="d-flex gap-3 align-center flex-wrap">
    <select class="form-control" style="width:180px" [(ngModel)]="typeFilter">
      <option value="">All Types</option>
      @for (t of types; track t) { <option [value]="t">{{ t.replace('_',' ') }}</option> }
    </select>
    <div class="d-flex align-center gap-2">
      <label class="form-label" style="margin:0;white-space:nowrap">From:</label>
      <input type="date" class="form-control" style="width:155px" [(ngModel)]="dateFrom" />
    </div>
    <div class="d-flex align-center gap-2">
      <label class="form-label" style="margin:0">To:</label>
      <input type="date" class="form-control" style="width:155px" [(ngModel)]="dateTo" />
    </div>
    <button class="btn btn-primary btn-sm" (click)="applyFilters()">Apply</button>
    <button class="btn btn-ghost btn-sm" (click)="clearFilters()">Clear</button>
  </div>
</div>

<app-data-table
  [columns]="columns"
  [data]="movements()"
  [loading]="loading()"
  [totalElements]="totalElements()"
  [page]="page()"
  [size]="25"
  (pageChange)="onPageChange($event)">
</app-data-table>
