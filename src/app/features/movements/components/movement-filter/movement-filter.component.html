<form class="filter-shell" [formGroup]="form" (ngSubmit)="apply()">
  <div class="filter-grid">
    <div class="filter-field">
      <label class="filter-label" for="movement-product-id">Product ID</label>
      <input
        id="movement-product-id"
        type="number"
        class="form-control"
        formControlName="productId"
        [disabled]="disabled"
        placeholder="Filter by product"
      />
    </div>

    <div class="filter-field">
      <label class="filter-label" for="movement-warehouse-id">Warehouse ID</label>
      <input
        id="movement-warehouse-id"
        type="number"
        class="form-control"
        formControlName="warehouseId"
        [disabled]="disabled"
        placeholder="Filter by warehouse"
      />
    </div>

    @if (lockedMovementType) {
      <div class="filter-field">
        <label class="filter-label">Movement Type</label>
        <div class="locked-filter">
          <span class="badge badge-info">{{ formatType(lockedMovementType) }}</span>
          <span class="locked-filter-note">Applied automatically for this role view.</span>
        </div>
      </div>
    } @else {
      <div class="filter-field">
        <label class="filter-label" for="movement-type">Movement Type</label>
        <select
          id="movement-type"
          class="form-control"
          formControlName="movementType"
          [disabled]="disabled"
        >
          <option value="">All Types</option>
          @for (movementType of movementTypes; track movementType) {
            <option [value]="movementType">{{ formatType(movementType) }}</option>
          }
        </select>
      </div>
    }

    <div class="filter-field">
      <label class="filter-label" for="movement-reference-id">Reference ID</label>
      <input
        id="movement-reference-id"
        type="text"
        class="form-control"
        formControlName="referenceId"
        [disabled]="disabled"
        placeholder="Search by reference"
      />
    </div>

    <div class="filter-field">
      <label class="filter-label" for="movement-start-date">Start Date</label>
      <input
        id="movement-start-date"
        type="date"
        class="form-control"
        formControlName="startDate"
        [disabled]="disabled"
      />
    </div>

    <div class="filter-field">
      <label class="filter-label" for="movement-end-date">End Date</label>
      <input
        id="movement-end-date"
        type="date"
        class="form-control"
        formControlName="endDate"
        [disabled]="disabled"
        [class.is-invalid]="hasInvalidDateRange"
      />
      @if (hasInvalidDateRange) {
        <p class="form-error">End date must be on or after the start date.</p>
      }
    </div>
  </div>

  <div class="filter-actions">
    <button type="submit" class="btn btn-primary" [disabled]="disabled">
      {{ submitLabel }}
    </button>
    <button type="button" class="btn btn-secondary" [disabled]="disabled" (click)="reset()">
      {{ resetLabel }}
    </button>
  </div>
</form>
