<div class="report-filter-card card">
  <div class="report-filter-header">
    <div>
      <div class="card-title">Filters</div>
      <p class="report-filter-subtitle">
        Narrow this report by the available business dimensions.
      </p>
    </div>

    @if (loadingLookups()) {
      <span class="text-sm text-muted">Loading filter options...</span>
    }
  </div>

  <form class="toolbar-form" [formGroup]="form" (ngSubmit)="apply()">
    <div class="filters-grid">
      @if (showWarehouse) {
        <div>
          <label class="form-label">Warehouse</label>
          <select class="form-control" formControlName="warehouseId">
            <option value="">All Warehouses</option>
            @for (warehouse of warehouses(); track warehouse.id) {
              <option [value]="warehouse.id">{{ warehouse.name }}</option>
            }
          </select>
        </div>
      }

      @if (showProduct) {
        <div>
          <label class="form-label">Product</label>
          <select class="form-control" formControlName="productId">
            <option value="">All Products</option>
            @for (product of products(); track product.productId) {
              <option [value]="product.productId">{{ product.name }}</option>
            }
          </select>
        </div>
      }

      @if (showSupplier) {
        <div>
          <label class="form-label">Supplier</label>
          <select class="form-control" formControlName="supplierId">
            <option value="">All Suppliers</option>
            @for (supplier of suppliers(); track supplier.supplierId) {
              <option [value]="supplier.supplierId">{{ supplier.name }}</option>
            }
          </select>
        </div>
      }

      @if (showPageSize) {
        <div>
          <label class="form-label">Page Size</label>
          <select class="form-control" formControlName="size">
            <option [value]="10">10 rows</option>
            <option [value]="20">20 rows</option>
            <option [value]="50">50 rows</option>
            <option [value]="100">100 rows</option>
          </select>
        </div>
      }
    </div>

    @if (showDateRange) {
      <app-date-range-filter
        [fromDate]="fromDate"
        [toDate]="toDate"
        [disabled]="disabled"
        hint="Use a valid reporting period to avoid incomplete analytics."
        (rangeChange)="onDateRangeChange($event)"
        (validityChange)="onDateRangeValidityChange($event)"
      />
    }

    <div class="filter-actions">
      <button class="btn btn-primary" type="submit" [disabled]="disabled || (showDateRange && !isDateRangeValid)">
        {{ submitLabel }}
      </button>
      <button class="btn btn-secondary" type="button" [disabled]="disabled" (click)="reset()">
        {{ resetLabel }}
      </button>
    </div>
  </form>
</div>
