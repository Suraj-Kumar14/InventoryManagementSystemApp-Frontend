<div class="reports-page">
  <div class="page-header">
    <div>
      <h1 class="page-title">Purchase Order Summary</h1>
      <p class="page-subtitle">
        Track supplier spend and purchase order activity over a selected period.
      </p>
    </div>

    <app-report-export-actions
      [canExport]="canExport()"
      [busy]="exportBusy()"
      (exportRequested)="onExport($event)"
    />
  </div>

  <app-report-filter
    [filters]="filters()"
    [showWarehouse]="true"
    [showSupplier]="true"
    [showDateRange]="true"
    submitLabel="Load PO Summary"
    (filtersChange)="onFiltersChange($event)"
  />

  <div class="summary-grid">
    <app-report-kpi-card
      title="Purchase Orders"
      [value]="loading() ? 'Loading...' : formatNumber(totalPOs())"
      subtitle="Total purchase orders in the current result set"
      icon="PO"
      tone="info"
    />

    <app-report-kpi-card
      title="Total Spend"
      [value]="loading() ? 'Loading...' : formatCurrency(totalSpend())"
      subtitle="Aggregate spend across the current grouped rows"
      icon="SPN"
      tone="primary"
    />

    <app-report-kpi-card
      title="Top Supplier"
      [value]="topSupplier() ? (topSupplier().supplierName || 'Unknown Supplier') : 'None'"
      [subtitle]="topSupplier() ? formatCurrency(topSupplier().totalSpend) : 'No supplier spend rows returned'"
      icon="SUP"
      tone="success"
    />
  </div>

  <app-report-table
    title="PO Summary Table"
    subtitle="Supplier and warehouse summary rows returned by the report-service."
    [columns]="columns"
    [data]="response().content"
    [loading]="loading()"
    [totalElements]="response().totalElements"
    [page]="response().page"
    [size]="response().size"
    [errorMessage]="errorMessage()"
    emptyTitle="No PO summary data"
    emptyDescription="Try broadening the date range or removing supplier and warehouse filters."
    (pageChange)="onPageChange($event)"
    (sortChange)="onSortChange($event)"
    (retry)="loadReport()"
  />
</div>
