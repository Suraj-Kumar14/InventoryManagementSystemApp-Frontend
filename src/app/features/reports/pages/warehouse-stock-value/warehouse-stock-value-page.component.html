<div class="reports-page">
  <div class="page-header">
    <div>
      <h1 class="page-title">Warehouse Stock Value</h1>
      <p class="page-subtitle">
        Compare stock valuation, unit volume, and utilization across warehouses.
      </p>
    </div>

    <div class="inline-actions">
      <label class="inline-filter">
        <span class="text-sm text-muted">Snapshot Date</span>
        <input
          class="form-control date-input"
          type="date"
          [value]="snapshotDate()"
          (change)="onDateChange($any($event.target).value)"
        />
      </label>
      <button class="btn btn-secondary" type="button" (click)="loadReport()" [disabled]="loading()">
        Apply
      </button>
      <app-report-export-actions
        [canExport]="canExport()"
        [busy]="exportBusy()"
        (exportRequested)="onExport($event)"
      />
    </div>
  </div>

  <div class="summary-grid">
    <app-report-kpi-card
      title="Combined Warehouse Value"
      [value]="loading() ? 'Loading...' : formatCurrency(totalValue())"
      [subtitle]="rows().length ? formatNumber(rows().length) + ' warehouses in the report' : 'No warehouses returned'"
      icon="WHV"
      tone="primary"
    />

    <app-report-kpi-card
      title="Top Warehouse"
      [value]="topWarehouse() ? topWarehouse().warehouseName : 'None'"
      [subtitle]="topWarehouse() ? formatCurrency(topWarehouse().totalStockValue) : 'No valuation rows returned'"
      icon="TOP"
      tone="info"
    />
  </div>

  <div class="warehouse-grid">
    <app-report-chart-card
      title="Warehouse Value Distribution"
      subtitle="Quick visual comparison of the valuation split by warehouse."
      [items]="chartItems()"
      format="currency"
    />

    <app-report-table
      title="Warehouse Valuation Table"
      subtitle="Detailed stock value response from the report-service."
      [columns]="columns"
      [data]="rows()"
      [loading]="loading()"
      [totalElements]="rows().length"
      [page]="0"
      [size]="rows().length || 1"
      [errorMessage]="errorMessage()"
      emptyTitle="No warehouse valuation data"
      emptyDescription="Try a different snapshot date or refresh the report service snapshot."
      (retry)="loadReport()"
    />
  </div>
</div>
