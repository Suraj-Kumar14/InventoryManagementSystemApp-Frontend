<div class="reports-page">
  <div class="page-header">
    <div>
      <h1 class="page-title">Dead Stock Report</h1>
      <p class="page-subtitle">
        Highlight inventory that has not moved beyond the configured inactivity threshold.
      </p>
    </div>

    <app-report-export-actions
      [canExport]="canExport()"
      [busy]="exportBusy()"
      (exportRequested)="onExport($event)"
    />
  </div>

  <div class="state-box warning">
    <div>
      <strong>Current dead stock threshold</strong>
      <p>
        Products inactive for more than {{ formatNumber(filters().thresholdDays) }} days are treated
        as dead stock in this view.
      </p>
    </div>

    <div class="inline-filter">
      <label class="form-label threshold-label">Threshold Days</label>
      <input
        class="form-control threshold-input"
        type="number"
        min="1"
        [value]="filters().thresholdDays || 90"
        (change)="onThresholdChange($any($event.target).value)"
      />
      <button class="btn btn-secondary btn-sm" type="button" (click)="loadReport()">
        Apply
      </button>
    </div>
  </div>

  <app-report-filter
    [filters]="filters()"
    [showWarehouse]="true"
    [showProduct]="true"
    submitLabel="Load Dead Stock"
    (filtersChange)="onFiltersChange($event)"
  />

  <div class="summary-grid">
    <app-report-kpi-card
      title="Dead Stock Rows"
      [value]="loading() ? 'Loading...' : formatNumber(response().totalElements)"
      subtitle="Products inactive beyond the threshold"
      icon="DED"
      tone="danger"
    />

    <app-report-kpi-card
      title="Most Idle Product"
      [value]="stalestItem() ? stalestItem().productName : 'None'"
      [subtitle]="stalestItem() ? formatNumber(stalestItem().daysWithoutMovement) + ' days without movement' : 'No dead stock rows returned'"
      icon="IDL"
      tone="warning"
    />
  </div>

  <app-report-table
    title="Dead Stock Table"
    subtitle="Products that need liquidation, promotion, or transfer review."
    [columns]="columns"
    [data]="response().content"
    [loading]="loading()"
    [totalElements]="response().totalElements"
    [page]="response().page"
    [size]="response().size"
    [errorMessage]="errorMessage()"
    emptyTitle="No dead stock rows"
    emptyDescription="Current filters do not return any stock considered inactive."
    (pageChange)="onPageChange($event)"
    (sortChange)="onSortChange($event)"
    (retry)="loadReport()"
  />
</div>
