<div class="reports-page">
  <div class="page-header">
    <div>
      <h1 class="page-title">Low Stock Report</h1>
      <p class="page-subtitle">
        Prioritize replenishment by warehouse and product before stock reaches zero.
      </p>
    </div>

    <app-report-export-actions
      [canExport]="canExport()"
      [busy]="exportBusy()"
      (exportRequested)="onExport($event)"
    />
  </div>

  <app-report-filter
    [filters]="filters()"
    [showWarehouse]="true"
    [showProduct]="true"
    submitLabel="Load Low Stock"
    (filtersChange)="onFiltersChange($event)"
  />

  <div class="summary-grid">
    <app-report-kpi-card
      title="Low Stock Rows"
      [value]="loading() ? 'Loading...' : formatNumber(response().totalElements)"
      subtitle="Total rows returned for the current filters"
      icon="LOW"
      tone="warning"
    />

    <app-report-kpi-card
      title="Most Critical Item"
      [value]="mostCriticalItem() ? mostCriticalItem().productName : 'None'"
      [subtitle]="mostCriticalItem() ? 'Available ' + formatNumber(mostCriticalItem().availableQuantity) : 'No low-stock rows returned'"
      icon="ALT"
      tone="danger"
    />
  </div>

  <app-report-table
    title="Low Stock Results"
    subtitle="Products that are currently at or below reorder expectations."
    [columns]="columns"
    [data]="response().content"
    [loading]="loading()"
    [totalElements]="response().totalElements"
    [page]="response().page"
    [size]="response().size"
    [errorMessage]="errorMessage()"
    emptyTitle="No low-stock products"
    emptyDescription="Current filters do not return any low-stock rows."
    (pageChange)="onPageChange($event)"
    (sortChange)="onSortChange($event)"
    (retry)="loadReport()"
  />
</div>
