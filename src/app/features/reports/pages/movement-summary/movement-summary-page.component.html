<div class="reports-page">
  <div class="page-header">
    <div>
      <h1 class="page-title">Movement Summary</h1>
      <p class="page-subtitle">
        Review inbound, outbound, adjustment, and transfer activity by product and warehouse.
      </p>
    </div>

    <app-report-export-actions
      [canExport]="canExport()"
      [busy]="exportBusy()"
      (exportRequested)="onExport($event)"
    />
  </div>

  <app-report-filter
    [filters]="filters()"
    [showWarehouse]="true"
    [showProduct]="true"
    [showDateRange]="true"
    submitLabel="Load Movement Summary"
    (filtersChange)="onFiltersChange($event)"
  />

  <div class="summary-grid">
    <app-report-kpi-card
      title="Total Stock In"
      [value]="loading() ? 'Loading...' : formatNumber(totalStockIn())"
      subtitle="Inbound quantity for the selected period"
      icon="IN"
      tone="success"
    />

    <app-report-kpi-card
      title="Total Stock Out"
      [value]="loading() ? 'Loading...' : formatNumber(totalStockOut())"
      subtitle="Outbound quantity for the selected period"
      icon="OUT"
      tone="warning"
    />

    <app-report-kpi-card
      title="Net Movement"
      [value]="loading() ? 'Loading...' : formatNumber(netMovement())"
      subtitle="Stock in minus stock out plus adjustments"
      icon="NET"
      tone="info"
    />
  </div>

  <app-report-table
    title="Movement Summary Rows"
    subtitle="Current movement totals across the selected reporting period."
    [columns]="columns"
    [data]="response().content"
    [loading]="loading()"
    [totalElements]="response().totalElements"
    [page]="response().page"
    [size]="response().size"
    [errorMessage]="errorMessage()"
    emptyTitle="No movement summary data"
    emptyDescription="Adjust the warehouse, product, or date filters to widen the result set."
    (pageChange)="onPageChange($event)"
    (sortChange)="onSortChange($event)"
    (retry)="loadReport()"
  />
</div>
