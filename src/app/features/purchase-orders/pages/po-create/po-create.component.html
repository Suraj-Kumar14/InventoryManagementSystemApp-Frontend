<section class="purchase-shell">
  <header class="header">
    <div>
      <p class="eyebrow">Draft New Order</p>
      <h1>Create Purchase Order</h1>
      <p>Build a clean draft, validate supplier and warehouse choices, then submit it into approval when ready.</p>
    </div>
    <a routerLink="/purchase-orders" class="back-link">Back to Purchase Orders</a>
  </header>

  <div *ngIf="lookupsLoading" class="loading-card">Loading suppliers, warehouses, and products...</div>
  <div *ngIf="!lookupsLoading && lookupError" class="loading-card">{{ lookupError }}</div>

  <app-po-form
    *ngIf="!lookupsLoading"
    [suppliers]="suppliers"
    [warehouses]="warehouses"
    [products]="products"
    [loading]="loading"
    [submitting]="submitting"
    [chargeFieldsReadOnly]="true"
    submitLabel="Save Draft"
    [showSubmitAndApprove]="true"
    (save)="saveDraft($event)"
    (saveAndSubmit)="saveAndSubmit($event)"
  ></app-po-form>
</section>
