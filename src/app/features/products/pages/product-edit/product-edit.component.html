<section class="page">
  <div class="page-header">
    <h1 class="page-header__title">Edit Product</h1>
    <p class="page-header__subtitle">Update product details while keeping SKU immutable.</p>
  </div>

  <app-loading-spinner *ngIf="loading" [message]="'Loading product details...'" />

  <app-product-form
    *ngIf="!loading && product"
    mode="edit"
    [initialProduct]="product"
    [loading]="saving"
    (submitted)="updateProduct($event)"
    (cancelled)="goBack()"
  />
</section>
