<div class="page-header">
  <div>
    <h1 class="page-title">Stock Levels</h1>
    <p class="page-subtitle">Monitor warehouse balances, reserved stock, and availability across your network.</p>
  </div>
  <div class="d-flex gap-2">
    <a routerLink="/stock/transfer" class="btn btn-secondary">Transfer Stock</a>
    <a routerLink="/stock/adjust" class="btn btn-secondary">Update Stock</a>
    <a routerLink="/stock/barcode" class="btn btn-outline">Barcode Lookup</a>
  </div>
</div>

<div class="card toolbar-card">
  <div class="toolbar-row">
    <div class="toolbar-filter">
      <label class="filter-label">Warehouse</label>
      <select
        class="form-control"
        [ngModel]="warehouseFilter() ?? ''"
        (ngModelChange)="onWarehouseChange($event)"
      >
        <option value="">All Warehouses</option>
        @for (wh of warehouses(); track wh.id) {
          <option [value]="wh.id">{{ wh.name }}</option>
        }
      </select>
    </div>

    <div class="legend-row">
      <span class="badge badge-danger">Low Available</span>
      <span class="badge badge-success">Healthy</span>
    </div>

    <span class="text-sm text-muted">{{ totalElements() }} stock records</span>
  </div>
</div>

@if (!loading() && stocks().length === 0) {
  <app-empty-state
    icon="ST"
    title="No stock records found"
    description="Try a different warehouse filter or update stock to create the first balance record."
  ></app-empty-state>
} @else {
  <app-data-table
    [columns]="columns"
    [data]="stocks()"
    [loading]="loading()"
    [totalElements]="totalElements()"
    [page]="page()"
    [size]="20"
    (pageChange)="onPageChange($event)"
  ></app-data-table>
}
