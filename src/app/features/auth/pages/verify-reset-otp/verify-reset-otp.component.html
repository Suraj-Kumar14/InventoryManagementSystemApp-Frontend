<div class="auth-page">
  <div class="auth-container">
    <div class="auth-card">
      <h2 class="auth-card__title">Verify Reset OTP</h2>
      <p class="auth-card__description">Enter the OTP sent to your email to continue.</p>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="auth-form">
        <div class="form-group">
          <input type="email" formControlName="email"
                 placeholder="user@example.com" class="form-input" />
          <p *ngIf="showError('email')" class="form-error">Invalid email.</p>
        </div>

        <div class="form-group">
          <input type="text" formControlName="otp" maxlength="6"
                 placeholder="Enter OTP" class="form-input" />
          <p *ngIf="showError('otp')" class="form-error">OTP must be 6 digits.</p>
        </div>

        <p *ngIf="serverError" class="form-server-error">{{ serverError }}</p>

        <button type="submit" [disabled]="form.invalid || isLoading" class="btn-primary">
          {{ isLoading ? 'Verifying...' : 'Verify OTP' }}
        </button>
      </form>

      <p class="auth-footer">
        <a routerLink="/forgot-password" class="auth-link">Back to forgot password</a>
      </p>
    </div>
  </div>
</div>
