<div class="auth-page">
  <div class="auth-container">
    <div class="auth-card">
      <h2 class="auth-card__title">Forgot Password</h2>
      <p class="auth-card__description">Enter your email to receive a reset OTP.</p>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="auth-form">
        <div class="form-group">
          <input type="email" formControlName="email"
                 placeholder="user@example.com" class="form-input" />
          <p *ngIf="showError('email')" class="form-error">Invalid email.</p>
        </div>

        <p *ngIf="serverError" class="form-server-error">{{ serverError }}</p>

        <button type="submit" [disabled]="form.invalid || isLoading" class="btn-primary">
          {{ isLoading ? 'Sending OTP...' : 'Send OTP' }}
        </button>
      </form>

      <p class="auth-footer">
        <a routerLink="/login" class="auth-link">Back to login</a>
      </p>
    </div>
  </div>
</div>
