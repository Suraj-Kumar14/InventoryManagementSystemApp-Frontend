<div class="auth-page">
  <div class="auth-container">
    <div class="auth-card">
      <h2 class="auth-card__title">Reset Password</h2>
      <p class="auth-card__description">Enter the OTP from your email and your new password.</p>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="auth-form">
        <div class="form-group">
          <input type="email" formControlName="email"
                 placeholder="user@example.com"
                 class="form-input form-input--readonly" readonly />
        </div>

        <div class="form-group">
          <input type="password" formControlName="newPassword"
                 placeholder="New password" class="form-input" />
          <p *ngIf="showError('newPassword')" class="form-error">
            Password must contain uppercase, lowercase, number, and special character.
          </p>
        </div>

        <p *ngIf="serverError" class="form-server-error">{{ serverError }}</p>

        <button type="submit" [disabled]="form.invalid || isLoading" class="btn-primary">
          {{ isLoading ? 'Updating...' : 'Reset Password' }}
        </button>
      </form>

      <p class="auth-footer">
        <a routerLink="/login" class="auth-link">Back to login</a>
      </p>
    </div>
  </div>
</div>
