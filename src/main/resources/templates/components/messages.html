<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="flashMessages">
    <div class="message-stack"
         th:if="${successMessage != null or errorMessage != null or warningMessage != null or infoMessage != null}">
        <div th:if="${successMessage != null}"
             th:replace="~{components/messages :: inline('Success', ${successMessage}, 'success')}"></div>
        <div th:if="${warningMessage != null}"
             th:replace="~{components/messages :: inline('Attention', ${warningMessage}, 'warning')}"></div>
        <div th:if="${errorMessage != null}"
             th:replace="~{components/messages :: inline('Action Required', ${errorMessage}, 'critical')}"></div>
        <div th:if="${infoMessage != null}"
             th:replace="~{components/messages :: inline('Information', ${infoMessage}, 'info')}"></div>
    </div>
</th:block>

<article th:fragment="inline(title, message, tone)"
         class="message-banner"
         th:classappend="${tone != null ? ' message-banner--' + tone : ''}">
    <div>
        <strong th:text="${title}">Information</strong>
        <p th:text="${message}">Message body</p>
    </div>
    <button type="button" class="message-banner__dismiss" data-dismiss-message aria-label="Dismiss message">Close</button>
</article>
</body>
</html>
