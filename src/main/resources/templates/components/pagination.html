<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<nav th:fragment="pager(pager)" class="pagination-bar" th:if="${pager != null and pager.totalPages > 1}">
    <p class="pagination-bar__summary"
       th:text="|Showing ${pager.rangeStart} - ${pager.rangeEnd} of ${pager.totalElements}|">Showing 1 - 10 of 10</p>
    <div class="pagination-bar__controls">
        <th:block th:if="${pager.firstUrl != null and pager.currentPage > 0}">
            <a class="pagination-link" th:href="${pager.firstUrl}">First</a>
        </th:block>
        <span class="pagination-link is-disabled" th:if="${pager.firstUrl == null or pager.currentPage == 0}">First</span>

        <th:block th:if="${pager.prevUrl != null and pager.currentPage > 0}">
            <a class="pagination-link" th:href="${pager.prevUrl}">Previous</a>
        </th:block>
        <span class="pagination-link is-disabled" th:if="${pager.prevUrl == null or pager.currentPage == 0}">Previous</span>

        <th:block th:each="pageItem : ${pager.pages}">
            <a class="pagination-link"
               th:href="${pageItem.url}"
               th:text="${pageItem.label}"
               th:classappend="${pageItem.active} ? ' is-active' : ''">1</a>
        </th:block>

        <th:block th:if="${pager.nextUrl != null and pager.currentPage + 1 < pager.totalPages}">
            <a class="pagination-link" th:href="${pager.nextUrl}">Next</a>
        </th:block>
        <span class="pagination-link is-disabled" th:if="${pager.nextUrl == null or pager.currentPage + 1 >= pager.totalPages}">Next</span>

        <th:block th:if="${pager.lastUrl != null and pager.currentPage + 1 < pager.totalPages}">
            <a class="pagination-link" th:href="${pager.lastUrl}">Last</a>
        </th:block>
        <span class="pagination-link is-disabled" th:if="${pager.lastUrl == null or pager.currentPage + 1 >= pager.totalPages}">Last</span>
    </div>
</nav>
</body>
</html>
