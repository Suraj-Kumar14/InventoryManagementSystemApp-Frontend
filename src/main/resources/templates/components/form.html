<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<section th:fragment="section(title, subtitle, content)" class="panel">
    <div class="panel__header">
        <div>
            <h2 class="panel__title" th:text="${title}">Form Title</h2>
            <p class="panel__subtitle" th:text="${subtitle}">Form subtitle</p>
        </div>
    </div>
    <div th:replace="${content}">
        <p>Form content unavailable.</p>
    </div>
</section>

<th:block th:fragment="fieldMessages(fieldName, hintText)">
    <p class="field-error" th:if="${#fields.hasErrors(fieldName)}" th:each="error : ${#fields.errors(fieldName)}" th:text="${error}">Validation error</p>
    <p class="field-hint" th:if="${hintText != null and !#fields.hasErrors(fieldName)}" th:text="${hintText}">Helper text</p>
</th:block>
</body>
</html>
