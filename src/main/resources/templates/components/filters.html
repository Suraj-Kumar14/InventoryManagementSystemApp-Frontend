<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<section th:fragment="panel(title, subtitle, content)" class="panel panel--filters">
    <div class="panel__header">
        <div>
            <h2 class="panel__title" th:text="${title}">Filters</h2>
            <p class="panel__subtitle" th:text="${subtitle}">Filter subtitle</p>
        </div>
    </div>
    <div th:replace="${content}">
        <p>No filter controls configured.</p>
    </div>
</section>
</body>
</html>
