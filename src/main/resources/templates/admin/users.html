<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout/base :: appLayout(~{::title}, ~{::pageContent}, ~{::pageScripts})}">
<head>
    <title>User Management | StockPro</title>
</head>
<body>
<th:block th:fragment="userHeaderActions"></th:block>

<th:block th:fragment="userFilters">
    <form th:action="@{/admin/users}" method="get" class="filters-grid" data-auto-submit>
        <div class="field-group field-group--full">
            <label class="field-label" for="user-search">Search</label>
            <input id="user-search"
                   class="field-control"
                   type="search"
                   name="search"
                   th:value="${userFilter != null and userFilter.search != null ? userFilter.search : param.search}"
                   placeholder="Search by name or email">
        </div>

        <div class="field-group">
            <label class="field-label" for="user-role">Role</label>
            <select id="user-role" class="field-control" name="role">
                <option value="">All roles</option>
                <option th:each="roleValue : ${roles}"
                        th:value="${roleValue}"
                        th:text="${roleValue}"
                        th:selected="${userFilter != null and userFilter.role == roleValue}">Role</option>
            </select>
        </div>

        <div class="field-group">
            <label class="field-label" for="user-status">Status</label>
            <select id="user-status" class="field-control" name="status">
                <option value="">All statuses</option>
                <option value="ACTIVE" th:selected="${userFilter != null and userFilter.status == 'ACTIVE'}">Active</option>
                <option value="INACTIVE" th:selected="${userFilter != null and userFilter.status == 'INACTIVE'}">Inactive</option>
            </select>
        </div>
    </form>
</th:block>

<th:block th:fragment="userTableActions">
    <div class="toolbar__actions">
        <span class="toolbar__meta"
              th:text="${usersPage != null ? usersPage.totalElements + ' users' : '0 users'}">0 users</span>
        <a class="btn btn--primary btn--small" th:href="@{/admin/users/new}">Invite user</a>
    </div>
</th:block>

<th:block th:fragment="userTable">
    <div th:if="${usersPage != null and usersPage.content != null and !#lists.isEmpty(usersPage.content)}">
        <div class="table-responsive">
            <table class="table">
                <thead>
                <tr>
                    <th>User</th>
                    <th>Role</th>
                    <th>Status</th>
                    <th>Last Login</th>
                    <th>Role Management</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="userItem : ${usersPage.content}">
                    <td>
                        <strong th:text="${userItem.fullName}">User name</strong>
                        <p class="secondary-text" th:text="${userItem.email}">user@example.com</p>
                    </td>
                    <td>
                        <span th:replace="~{components/badge :: pill(${userItem.role}, 'info')}"></span>
                    </td>
                    <td>
                        <span th:replace="~{components/badge :: pill(${userItem.active ? 'Active' : 'Inactive'}, ${userItem.active ? 'success' : 'neutral'})}"></span>
                    </td>
                    <td th:text="${userItem.lastLoginAt != null ? #temporals.format(userItem.lastLoginAt, 'dd MMM yyyy, HH:mm') : 'Never logged in'}">Never logged in</td>
                    <td>
                        <form th:action="@{/admin/users/{id}/role(id=${userItem.id})}" method="post" class="row-actions">
                            <select class="field-control" name="role" style="min-width: 10rem;">
                                <option th:each="roleValue : ${roles}"
                                        th:value="${roleValue}"
                                        th:text="${roleValue}"
                                        th:selected="${userItem.role == roleValue}">Role</option>
                            </select>
                            <button type="submit" class="btn btn--secondary btn--small" data-loading-text="Updating...">Update role</button>
                        </form>
                    </td>
                    <td>
                        <div class="row-actions">
                            <form th:action="@{/admin/users/{id}/toggle-status(id=${userItem.id})}"
                                  method="post"
                                  th:attr="data-confirm=${userItem.active ? 'Deactivate this user account?' : 'Reactivate this user account?'}">
                                <button type="submit"
                                        class="btn btn--small"
                                        th:classappend="${userItem.active} ? ' btn--danger' : ' btn--primary'"
                                        data-loading-text="Saving..."
                                        th:text="${userItem.active ? 'Deactivate' : 'Activate'}">Deactivate</button>
                            </form>
                            <form th:action="@{/admin/users/{id}/reset-password(id=${userItem.id})}" method="post" data-confirm="Send a password reset to this user?">
                                <button type="submit" class="btn btn--ghost btn--small" data-loading-text="Sending...">Reset password</button>
                            </form>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
        <div th:replace="~{components/pagination :: pager(${usersPager})}"></div>
    </div>

    <div th:if="${usersPage == null or usersPage.content == null or #lists.isEmpty(usersPage.content)}"
         th:replace="~{components/common :: emptyState('No users found', 'Try clearing filters or invite a new user to get started.')}"></div>
</th:block>

<th:block th:fragment="pageContent">
    <section th:replace="~{components/common :: pageHeader('Administration', 'User Management', 'Manage roles, account status, and access recovery for StockPro users.', ~{::userHeaderActions})}"></section>

    <section th:replace="~{components/filters :: panel('User Filters', 'Filter users by name, email, role, or account status.', ~{::userFilters})}"></section>
    <section th:replace="~{components/table :: shell('User Directory', 'Role-based access control and lifecycle management for platform accounts.', ~{::userTableActions}, ~{::userTable})}"></section>
</th:block>

<th:block th:fragment="pageScripts"></th:block>
</body>
</html>
