<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout/base :: appLayout(~{::title}, ~{::pageContent}, ~{::pageScripts})}">
<head>
    <title>Transfer Stock | StockPro</title>
</head>
<body>
<th:block th:fragment="transferHeaderActions"></th:block>

<th:block th:fragment="transferFormBody">
    <form th:action="@{/inventory/stock/transfer}"
          th:object="${transferForm}"
          method="post"
          novalidate
          data-loading>
        <div class="form-grid form-grid--two">
            <div class="field-group">
                <label class="field-label" for="transfer-source">Source Warehouse</label>
                <select id="transfer-source"
                        class="field-control"
                        th:field="*{sourceWarehouseId}"
                        th:classappend="${#fields.hasErrors('sourceWarehouseId')} ? ' is-invalid' : ''"
                        required>
                    <option value="">Select source warehouse</option>
                    <option th:each="warehouse : ${warehouses}" th:value="${warehouse.id}" th:text="${warehouse.name}">Warehouse</option>
                </select>
                <div th:replace="~{components/form :: fieldMessages('sourceWarehouseId', 'Warehouse that will release stock for this transfer.')}"></div>
            </div>

            <div class="field-group">
                <label class="field-label" for="transfer-destination">Destination Warehouse</label>
                <select id="transfer-destination"
                        class="field-control"
                        th:field="*{destinationWarehouseId}"
                        th:classappend="${#fields.hasErrors('destinationWarehouseId')} ? ' is-invalid' : ''"
                        required>
                    <option value="">Select destination warehouse</option>
                    <option th:each="warehouse : ${warehouses}" th:value="${warehouse.id}" th:text="${warehouse.name}">Warehouse</option>
                </select>
                <div th:replace="~{components/form :: fieldMessages('destinationWarehouseId', 'Warehouse that will receive stock from this transfer.')}"></div>
            </div>

            <div class="field-group field-group--full">
                <label class="field-label" for="transfer-product">Product</label>
                <select id="transfer-product"
                        class="field-control"
                        th:field="*{productId}"
                        th:classappend="${#fields.hasErrors('productId')} ? ' is-invalid' : ''"
                        required>
                    <option value="">Select product</option>
                    <option th:each="product : ${products}"
                            th:value="${product.id}"
                            th:text="${product.name + ' (' + product.sku + ')'}">Product</option>
                </select>
                <div th:replace="~{components/form :: fieldMessages('productId', 'Choose the product that will be moved between warehouses.')}"></div>
            </div>

            <div class="field-group">
                <label class="field-label" for="transfer-quantity">Quantity</label>
                <input id="transfer-quantity"
                       class="field-control"
                       type="number"
                       min="1"
                       th:field="*{quantity}"
                       th:classappend="${#fields.hasErrors('quantity')} ? ' is-invalid' : ''"
                       required>
                <div th:replace="~{components/form :: fieldMessages('quantity', 'Quantity must be greater than zero.')}"></div>
            </div>

            <div class="field-group">
                <label class="field-label" for="transfer-reference">Reference</label>
                <input id="transfer-reference"
                       class="field-control"
                       type="text"
                       th:field="*{reference}"
                       placeholder="Transfer note, request, or ticket number">
                <div th:replace="~{components/form :: fieldMessages('reference', 'Optional reference used for audit and traceability.')}"></div>
            </div>

            <div class="field-group field-group--full">
                <label class="field-label" for="transfer-notes">Notes</label>
                <textarea id="transfer-notes"
                          class="field-control"
                          rows="4"
                          th:field="*{notes}"
                          placeholder="Operational notes for the receiving warehouse"></textarea>
                <div th:replace="~{components/form :: fieldMessages('notes', 'Include handling instructions or reason for transfer when needed.')}"></div>
            </div>
        </div>

        <div class="message-banner message-banner--critical" th:if="${#fields.hasGlobalErrors()}">
            <div>
                <strong>Transfer validation failed</strong>
                <p th:each="error : ${#fields.globalErrors()}" th:text="${error}">Global validation error</p>
            </div>
        </div>

        <div class="form-actions">
            <a class="btn btn--secondary" th:href="@{/inventory/stock}">Cancel</a>
            <button type="submit" class="btn btn--primary" data-loading-text="Submitting transfer...">Transfer stock</button>
        </div>
    </form>
</th:block>

<th:block th:fragment="pageContent">
    <section th:replace="~{components/common :: pageHeader('Inventory', 'Transfer Stock', 'Move stock between warehouses with validation, audit context, and server side error feedback.', ~{::transferHeaderActions})}"></section>

    <section th:replace="~{components/form :: section('Transfer Request', 'Choose the source, destination, product, and quantity for this warehouse transfer.', ~{::transferFormBody})}"></section>
</th:block>

<th:block th:fragment="pageScripts"></th:block>
</body>
</html>
