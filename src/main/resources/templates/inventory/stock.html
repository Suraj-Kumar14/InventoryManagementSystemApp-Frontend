<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout/base :: appLayout(~{::title}, ~{::pageContent}, ~{::pageScripts})}">
<head>
    <title>Stock Levels | StockPro</title>
</head>
<body>
<th:block th:fragment="stockHeaderActions">
    <a class="btn btn--primary"
       th:href="@{/inventory/stock/transfer}"
       sec:authorize="hasAnyRole('ADMIN','INVENTORY_MANAGER','WAREHOUSE_STAFF')">Transfer stock</a>
</th:block>

<th:block th:fragment="stockFilters">
    <form th:action="@{/inventory/stock}" method="get" class="filters-grid" data-auto-submit>
        <div class="field-group">
            <label class="field-label" for="stock-warehouse">Warehouse</label>
            <select id="stock-warehouse" class="field-control" name="warehouseId">
                <option value="">All warehouses</option>
                <option th:each="warehouse : ${warehouses}"
                        th:value="${warehouse.id}"
                        th:text="${warehouse.name}"
                        th:selected="${stockFilter != null and stockFilter.warehouseId == warehouse.id}">Warehouse</option>
            </select>
        </div>

        <div class="field-group">
            <label class="field-label" for="stock-product">Product</label>
            <select id="stock-product" class="field-control" name="productId">
                <option value="">All products</option>
                <option th:each="productOption : ${products}"
                        th:value="${productOption.id}"
                        th:text="${productOption.name}"
                        th:selected="${stockFilter != null and stockFilter.productId == productOption.id}">Product</option>
            </select>
        </div>

        <div class="field-group">
            <label class="field-label" for="stock-status">Availability</label>
            <select id="stock-status" class="field-control" name="status">
                <option value="">All rows</option>
                <option value="LOW" th:selected="${stockFilter != null and stockFilter.status == 'LOW'}">Low stock only</option>
                <option value="HEALTHY" th:selected="${stockFilter != null and stockFilter.status == 'HEALTHY'}">Healthy only</option>
            </select>
        </div>

        <div class="field-group">
            <label class="field-label" for="stock-search">Search</label>
            <input id="stock-search"
                   class="field-control"
                   type="search"
                   name="search"
                   th:value="${stockFilter != null and stockFilter.search != null ? stockFilter.search : param.search}"
                   placeholder="Product name or SKU">
        </div>
    </form>
</th:block>

<th:block th:fragment="stockTableActions">
    <div class="toolbar__actions">
        <span class="toolbar__meta"
              th:text="${stockPage != null ? stockPage.totalElements + ' stock rows' : '0 stock rows'}">0 stock rows</span>
        <a class="btn btn--secondary btn--small"
           th:href="@{/inventory/stock/transfer}"
           sec:authorize="hasAnyRole('ADMIN','INVENTORY_MANAGER','WAREHOUSE_STAFF')">Transfer stock</a>
    </div>
</th:block>

<th:block th:fragment="stockTable">
    <div th:if="${stockPage != null and stockPage.content != null and !#lists.isEmpty(stockPage.content)}">
        <div class="table-responsive">
            <table class="table">
                <thead>
                <tr>
                    <th>Warehouse</th>
                    <th>Product</th>
                    <th>SKU</th>
                    <th>On Hand</th>
                    <th>Reserved</th>
                    <th>Available</th>
                    <th>Reorder</th>
                    <th>Status</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="stock : ${stockPage.content}"
                    th:classappend="${stock.availableQuantity <= 0} ? ' row-critical' : (${stock.availableQuantity <= stock.reorderLevel} ? ' row-warning' : '')">
                    <td th:text="${stock.warehouseName}">Warehouse</td>
                    <td>
                        <strong th:text="${stock.productName}">Product</strong>
                        <p class="secondary-text" th:text="${stock.category != null ? stock.category : 'Category not set'}">Category</p>
                    </td>
                    <td th:text="${stock.sku}">SKU001</td>
                    <td th:text="${stock.onHandQuantity}">0</td>
                    <td th:text="${stock.reservedQuantity}">0</td>
                    <td th:text="${stock.availableQuantity}">0</td>
                    <td th:text="${stock.reorderLevel != null ? stock.reorderLevel : 0}">0</td>
                    <td>
                        <span th:replace="~{components/badge :: pill(${stock.availableQuantity <= 0 ? 'Critical' : (stock.availableQuantity <= stock.reorderLevel ? 'Low' : 'Healthy')}, ${stock.availableQuantity <= 0 ? 'critical' : (stock.availableQuantity <= stock.reorderLevel ? 'warning' : 'success')})}"></span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
        <div th:replace="~{components/pagination :: pager(${stockPager})}"></div>
    </div>

    <div th:if="${stockPage == null or stockPage.content == null or #lists.isEmpty(stockPage.content)}"
         th:replace="~{components/common :: emptyState('No stock rows found', 'Try selecting a different warehouse or clearing the current product filter.')}"></div>
</th:block>

<th:block th:fragment="pageContent">
    <section th:replace="~{components/common :: pageHeader('Inventory', 'Stock Levels', 'Monitor on hand, reserved, and available stock across warehouses and products.', ~{::stockHeaderActions})}"></section>

    <section th:replace="~{components/filters :: panel('Stock Filters', 'Filter stock by warehouse, product, or availability state.', ~{::stockFilters})}"></section>
    <section th:replace="~{components/table :: shell('Stock Balance Table', 'Warehouse and product level stock balances.', ~{::stockTableActions}, ~{::stockTable})}"></section>
</th:block>

<th:block th:fragment="pageScripts"></th:block>
</body>
</html>
