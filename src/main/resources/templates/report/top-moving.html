<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout/base :: appLayout(~{::title}, ~{::pageContent}, ~{::pageScripts})}">
<head>
    <title>Top Moving Products | StockPro</title>
</head>
<body>
<th:block th:fragment="topMovingHeaderActions"></th:block>

<th:block th:fragment="topMovingFilters">
    <form th:action="@{/reports/top-moving}" method="get" class="filters-grid" data-auto-submit>
        <div class="field-group">
            <label class="field-label" for="top-moving-start">Start Date</label>
            <input id="top-moving-start" class="field-control" type="date" name="startDate"
                   th:value="${topMovingFilter != null ? topMovingFilter.startDate : param.startDate}">
        </div>
        <div class="field-group">
            <label class="field-label" for="top-moving-end">End Date</label>
            <input id="top-moving-end" class="field-control" type="date" name="endDate"
                   th:value="${topMovingFilter != null ? topMovingFilter.endDate : param.endDate}">
        </div>
        <div class="field-group">
            <label class="field-label" for="top-moving-limit">Page Size</label>
            <select id="top-moving-limit" class="field-control" name="size">
                <option value="10" th:selected="${topMovingFilter == null or topMovingFilter.size == null or topMovingFilter.size == 10}">10 rows</option>
                <option value="20" th:selected="${topMovingFilter != null and topMovingFilter.size == 20}">20 rows</option>
                <option value="50" th:selected="${topMovingFilter != null and topMovingFilter.size == 50}">50 rows</option>
            </select>
        </div>
    </form>
</th:block>

<th:block th:fragment="topMovingTableActions">
    <span class="toolbar__meta"
          th:text="${topMovingPage != null ? topMovingPage.totalElements + ' ranked products' : '0 ranked products'}">0 ranked products</span>
</th:block>

<th:block th:fragment="topMovingTable">
    <div th:if="${topMovingPage != null and topMovingPage.content != null and !#lists.isEmpty(topMovingPage.content)}">
        <div class="table-responsive">
            <table class="table rank-table">
                <thead>
                <tr>
                    <th>Rank</th>
                    <th>Product</th>
                    <th>Category</th>
                    <th>Movement Qty</th>
                    <th>Last Movement</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="row, stat : ${topMovingPage.content}">
                    <td class="rank-cell" th:text="${stat.count + ((topMovingPage.number != null ? topMovingPage.number : 0) * (topMovingPage.size != null ? topMovingPage.size : 0))}">1</td>
                    <td th:text="${row.productName}">Product</td>
                    <td th:text="${row.category != null ? row.category : 'Category not set'}">Category</td>
                    <td th:text="${row.totalMovementQuantity}">0</td>
                    <td th:text="${row.lastMovementDate != null ? #temporals.format(row.lastMovementDate, 'dd MMM yyyy') : 'Not available'}">Not available</td>
                </tr>
                </tbody>
            </table>
        </div>
        <div th:replace="~{components/pagination :: pager(${topMovingPager})}"></div>
    </div>

    <div th:if="${topMovingPage == null or topMovingPage.content == null or #lists.isEmpty(topMovingPage.content)}"
         th:replace="~{components/common :: emptyState('No top moving products', 'Try expanding the date range to include more movement activity.')}"></div>
</th:block>

<th:block th:fragment="pageContent">
    <section th:replace="~{components/common :: pageHeader('Reports', 'Top Moving Products', 'Rank products with the highest movement quantity in the selected date range.', ~{::topMovingHeaderActions})}"></section>

    <section th:replace="~{components/filters :: panel('Ranking Filters', 'Choose the date range used to rank the top moving products.', ~{::topMovingFilters})}"></section>
    <section th:replace="~{components/table :: shell('Ranking Table', 'Highest movement quantity products for the selected reporting window.', ~{::topMovingTableActions}, ~{::topMovingTable})}"></section>
</th:block>

<th:block th:fragment="pageScripts"></th:block>
</body>
</html>
