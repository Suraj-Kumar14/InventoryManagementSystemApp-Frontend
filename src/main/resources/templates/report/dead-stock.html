<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout/base :: appLayout(~{::title}, ~{::pageContent}, ~{::pageScripts})}">
<head>
    <title>Dead Stock Report | StockPro</title>
</head>
<body>
<th:block th:fragment="deadStockHeaderActions"></th:block>

<th:block th:fragment="deadStockFilters">
    <form th:action="@{/reports/dead-stock}" method="get" class="filters-grid" data-auto-submit>
        <div class="field-group">
            <label class="field-label" for="dead-stock-warehouse">Warehouse</label>
            <select id="dead-stock-warehouse" class="field-control" name="warehouseId">
                <option value="">All warehouses</option>
                <option th:each="warehouse : ${warehouses}"
                        th:value="${warehouse.id}"
                        th:text="${warehouse.name}"
                        th:selected="${deadStockFilter != null and deadStockFilter.warehouseId == warehouse.id}">Warehouse</option>
            </select>
        </div>

        <div class="field-group">
            <label class="field-label" for="dead-stock-product">Product</label>
            <select id="dead-stock-product" class="field-control" name="productId">
                <option value="">All products</option>
                <option th:each="productOption : ${products}"
                        th:value="${productOption.id}"
                        th:text="${productOption.name}"
                        th:selected="${deadStockFilter != null and deadStockFilter.productId == productOption.id}">Product</option>
            </select>
        </div>

        <div class="field-group">
            <label class="field-label" for="dead-stock-threshold">Threshold Days</label>
            <input id="dead-stock-threshold"
                   class="field-control"
                   type="number"
                   min="1"
                   name="thresholdDays"
                   th:value="${deadStockFilter != null and deadStockFilter.thresholdDays != null ? deadStockFilter.thresholdDays : 90}">
        </div>
    </form>
</th:block>

<th:block th:fragment="deadStockTableActions">
    <span class="toolbar__meta"
          th:text="${deadStockPage != null ? deadStockPage.totalElements + ' dead stock rows' : '0 dead stock rows'}">0 dead stock rows</span>
</th:block>

<th:block th:fragment="deadStockTable">
    <div th:if="${deadStockPage != null and deadStockPage.content != null and !#lists.isEmpty(deadStockPage.content)}">
        <div class="table-responsive">
            <table class="table">
                <thead>
                <tr>
                    <th>Product</th>
                    <th>Warehouse</th>
                    <th>Days Without Movement</th>
                    <th>On Hand</th>
                    <th>Stock Value</th>
                    <th>Status</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="row : ${deadStockPage.content}" class="row-warning">
                    <td>
                        <strong th:text="${row.productName}">Product</strong>
                        <p class="secondary-text" th:text="${row.sku != null ? row.sku : 'No SKU'}">No SKU</p>
                    </td>
                    <td th:text="${row.warehouseName}">Warehouse</td>
                    <td th:text="${row.daysWithoutMovement}">0</td>
                    <td th:text="${row.onHandQuantity}">0</td>
                    <td th:text="${row.stockValue != null ? 'INR ' + #numbers.formatDecimal(row.stockValue, 1, 'COMMA', 2, 'POINT') : 'INR 0.00'}">INR 0.00</td>
                    <td>
                        <span th:replace="~{components/badge :: pill('Warning', 'warning')}"></span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
        <div th:replace="~{components/pagination :: pager(${deadStockPager})}"></div>
    </div>

    <div th:if="${deadStockPage == null or deadStockPage.content == null or #lists.isEmpty(deadStockPage.content)}"
         th:replace="~{components/common :: emptyState('No dead stock rows', 'Current filters do not return any inventory inactive beyond the threshold days.')}"></div>
</th:block>

<th:block th:fragment="pageContent">
    <section th:replace="~{components/common :: pageHeader('Reports', 'Dead Stock Report', 'Identify products that have not moved recently and may require liquidation or transfer review.', ~{::deadStockHeaderActions})}"></section>

    <section class="panel">
        <div class="message-banner message-banner--warning">
            <div>
                <strong>Threshold-based view</strong>
                <p th:text="${deadStockFilter != null and deadStockFilter.thresholdDays != null ? 'Products inactive for more than ' + deadStockFilter.thresholdDays + ' days are flagged in this report.' : 'Products inactive beyond the configured threshold are flagged in this report.'}">Products inactive beyond the configured threshold are flagged in this report.</p>
            </div>
        </div>
    </section>

    <section th:replace="~{components/filters :: panel('Dead Stock Filters', 'Filter dead stock by warehouse, product, and inactivity threshold.', ~{::deadStockFilters})}"></section>
    <section th:replace="~{components/table :: shell('Dead Stock Results', 'Inventory rows that have not moved within the configured threshold.', ~{::deadStockTableActions}, ~{::deadStockTable})}"></section>
</th:block>

<th:block th:fragment="pageScripts"></th:block>
</body>
</html>
