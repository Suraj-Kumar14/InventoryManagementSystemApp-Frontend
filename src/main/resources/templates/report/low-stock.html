<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout/base :: appLayout(~{::title}, ~{::pageContent}, ~{::pageScripts})}">
<head>
    <title>Low Stock Report | StockPro</title>
</head>
<body>
<th:block th:fragment="lowStockHeaderActions"></th:block>

<th:block th:fragment="lowStockFilters">
    <form th:action="@{/reports/low-stock}" method="get" class="filters-grid" data-auto-submit>
        <div class="field-group">
            <label class="field-label" for="low-stock-warehouse">Warehouse</label>
            <select id="low-stock-warehouse" class="field-control" name="warehouseId">
                <option value="">All warehouses</option>
                <option th:each="warehouse : ${warehouses}"
                        th:value="${warehouse.id}"
                        th:text="${warehouse.name}"
                        th:selected="${lowStockFilter != null and lowStockFilter.warehouseId == warehouse.id}">Warehouse</option>
            </select>
        </div>

        <div class="field-group">
            <label class="field-label" for="low-stock-product">Product</label>
            <select id="low-stock-product" class="field-control" name="productId">
                <option value="">All products</option>
                <option th:each="productOption : ${products}"
                        th:value="${productOption.id}"
                        th:text="${productOption.name}"
                        th:selected="${lowStockFilter != null and lowStockFilter.productId == productOption.id}">Product</option>
            </select>
        </div>

        <div class="field-group">
            <label class="field-label" for="low-stock-sort">Sort By</label>
            <select id="low-stock-sort" class="field-control" name="sortBy">
                <option value="severity" th:selected="${lowStockFilter == null or lowStockFilter.sortBy == null or lowStockFilter.sortBy == 'severity'}">Severity</option>
                <option value="warehouse" th:selected="${lowStockFilter != null and lowStockFilter.sortBy == 'warehouse'}">Warehouse</option>
                <option value="product" th:selected="${lowStockFilter != null and lowStockFilter.sortBy == 'product'}">Product</option>
            </select>
        </div>
    </form>
</th:block>

<th:block th:fragment="lowStockTableActions">
    <span class="toolbar__meta"
          th:text="${lowStockPage != null ? lowStockPage.totalElements + ' low stock rows' : '0 low stock rows'}">0 low stock rows</span>
</th:block>

<th:block th:fragment="lowStockTable">
    <div th:if="${lowStockPage != null and lowStockPage.content != null and !#lists.isEmpty(lowStockPage.content)}">
        <div class="table-responsive">
            <table class="table">
                <thead>
                <tr>
                    <th>Product</th>
                    <th>Warehouse</th>
                    <th>Available</th>
                    <th>Reorder</th>
                    <th>Gap</th>
                    <th>Status</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="row : ${lowStockPage.content}"
                    th:classappend="${row.availableQuantity <= 0} ? ' row-critical' : ' row-warning'">
                    <td>
                        <strong th:text="${row.productName}">Product</strong>
                        <p class="secondary-text" th:text="${row.sku != null ? row.sku : 'No SKU'}">No SKU</p>
                    </td>
                    <td th:text="${row.warehouseName}">Warehouse</td>
                    <td th:text="${row.availableQuantity}">0</td>
                    <td th:text="${row.reorderLevel}">0</td>
                    <td th:text="${row.reorderLevel - row.availableQuantity}">0</td>
                    <td>
                        <span th:replace="~{components/badge :: pill(${row.availableQuantity <= 0 ? 'Critical' : 'Low'}, ${row.availableQuantity <= 0 ? 'critical' : 'warning'})}"></span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
        <div th:replace="~{components/pagination :: pager(${lowStockPager})}"></div>
    </div>

    <div th:if="${lowStockPage == null or lowStockPage.content == null or #lists.isEmpty(lowStockPage.content)}"
         th:replace="~{components/common :: emptyState('No low stock rows', 'Current filters do not return any products below their reorder threshold.')}"></div>
</th:block>

<th:block th:fragment="pageContent">
    <section th:replace="~{components/common :: pageHeader('Reports', 'Low Stock Report', 'Highlight warehouse product combinations that need replenishment planning first.', ~{::lowStockHeaderActions})}"></section>

    <section class="panel">
        <div class="message-banner message-banner--warning">
            <div>
                <strong>Critical rows are highlighted</strong>
                <p>Rows with zero or negative available balance are styled more prominently so teams can prioritize them immediately.</p>
            </div>
        </div>
    </section>

    <section th:replace="~{components/filters :: panel('Report Filters', 'Filter the low stock report by warehouse or product.', ~{::lowStockFilters})}"></section>
    <section th:replace="~{components/table :: shell('Low Stock Results', 'Inventory items below or near their reorder threshold.', ~{::lowStockTableActions}, ~{::lowStockTable})}"></section>
</th:block>

<th:block th:fragment="pageScripts"></th:block>
</body>
</html>
